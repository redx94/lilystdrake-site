<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lily St. Drake | Gallery</title>
  <meta name="description" content="Browse Lily St. Drake's iconic looks and performances">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@300;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { void: '#050505', acid: '#39ff14', 'neon-yellow': '#d4ff00', 'text-primary': '#e8e8e8', 'text-dim': '#666666', 'border-subtle': 'rgba(57, 255, 20, 0.08)' },
          fontFamily: { montserrat: ['Montserrat', 'sans-serif'], inter: ['Inter', 'sans-serif'] },
        },
      },
    }
  </script>
  <style>
    :root { --void: #050505; --acid: #39ff14; --neon-yellow: #d4ff00; --text-primary: #e8e8e8; --text-dim: #666666; --border-subtle: rgba(57,255,20,0.08); }
    html { scroll-behavior: smooth; }
    body { background: var(--void); color: var(--text-primary); font-family: 'Inter', sans-serif; overflow-x: hidden; }
    .panel-surface { background: rgba(12,12,12,0.85); border: 1px solid var(--border-subtle); }
    .section-title-glow { text-shadow: 0 0 30px rgba(57,255,20,0.4); }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleXIn { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(0.16,1,0.3,1); }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    body { cursor: auto; }
  </style>
</head>
<body>
  <!-- Starfield -->
  <canvas id="starfield" class="fixed top-0 left-0 w-screen h-screen" style="z-index: 0"></canvas>

  <!-- Nav -->
  <nav id="navbar" class="fixed top-0 left-0 right-0 h-16 flex items-center justify-between px-6 md:px-10 transition-all duration-500" style="z-index: 50; background: transparent;">
    <a href="/" class="font-montserrat font-bold text-sm tracking-[0.15em] text-acid hover:text-neon-yellow transition-colors duration-200">LSD</a>
    <div class="hidden lg:flex items-center gap-6">
      <a href="/" class="font-inter font-medium text-sm tracking-[0.08em] text-text-dim hover:text-acid transition-all duration-200">HOME</a>
      <a href="/#about" class="font-inter font-medium text-sm tracking-[0.08em] text-text-dim hover:text-acid transition-all duration-200">ABOUT</a>
      <a href="/#bookings" class="font-inter font-medium text-sm tracking-[0.08em] text-text-dim hover:text-acid transition-all duration-200">BOOKINGS</a>
      <a href="/#connect" class="font-inter font-medium text-sm tracking-[0.08em] text-text-dim hover:text-acid transition-all duration-200">CONNECT</a>
    </div>
    <button onclick="document.getElementById('mobileMenu').style.display='flex'" class="lg:hidden text-acid" aria-label="Menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </nav>
  <div id="mobileMenu" class="fixed inset-0 flex flex-col items-center justify-center gap-8" style="z-index: 100; background: rgba(5,5,5,0.97); display: none;">
    <button onclick="document.getElementById('mobileMenu').style.display='none'" class="absolute top-5 right-6 text-acid"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    <a href="/" onclick="document.getElementById('mobileMenu').style.display='none'" class="font-montserrat font-extrabold text-3xl text-acid tracking-tight" style="animation: fadeInUp 0.5s 0s forwards">HOME</a>
    <a href="/#about" onclick="document.getElementById('mobileMenu').style.display='none'" class="font-montserrat font-extrabold text-3xl text-acid tracking-tight" style="animation: fadeInUp 0.5s 0.08s forwards">ABOUT</a>
    <a href="/#bookings" onclick="document.getElementById('mobileMenu').style.display='none'" class="font-montserrat font-extrabold text-3xl text-acid tracking-tight" style="animation: fadeInUp 0.5s 0.16s forwards">BOOKINGS</a>
    <a href="/#connect" onclick="document.getElementById('mobileMenu').style.display='none'" class="font-montserrat font-extrabold text-3xl text-acid tracking-tight" style="animation: fadeInUp 0.5s 0.24s forwards">CONNECT</a>
  </div>

  <!-- Main -->
  <main class="relative pt-24 pb-16" style="z-index: 1">
    <div class="max-w-[1400px] mx-auto px-6 md:px-10">
      <div class="text-center mb-12">
        <span class="font-inter font-semibold text-xs tracking-[0.15em] text-acid uppercase block mb-4 reveal">THE LOOKS</span>
        <h1 class="font-montserrat font-extrabold text-acid section-title-glow reveal" style="font-size: clamp(2rem,5vw,3.5rem); line-height: 1.1;">GALLERY</h1>
        <p class="font-inter text-text-dim mt-4 max-w-lg mx-auto reveal reveal-delay-1">Every performance, a masterpiece. Browse through Lily's iconic looks.</p>
        <div class="flex flex-wrap items-center justify-center gap-2 mt-8 reveal reveal-delay-2" id="filterContainer"></div>
      </div>
      <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="relative py-12" style="z-index: 1">
    <div class="max-w-[1200px] mx-auto px-6 md:px-10 pt-8 border-t border-border-subtle flex flex-col md:flex-row items-center justify-between gap-4">
      <p class="font-inter font-semibold text-xs tracking-[0.15em] text-text-dim uppercase">&copy; 2026 Lily St. Drake LLC. All rights reserved.</p>
      <a href="/" class="font-inter font-semibold text-xs tracking-[0.15em] text-acid uppercase hover:text-neon-yellow transition-colors duration-200">&larr; BACK TO MAIN SITE</a>
    </div>
  </footer>

  <script src="/distortion-cursor.js"></script>
  <script>
    // Starfield
    (function() {
      const canvas = document.getElementById('starfield');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      if (!ctx) return;
      const COLORS = ['#39FF14','#32CD32','#228B22','#7CFC00','#ADFF2F','#00FF41','#66FF00','#B2FF00','#CCFF00','#E5FF00','#FFFF00','#FFD700','#00FA9A','#00FF7F'];
      if (window.innerWidth < 768) { canvas.style.background = 'radial-gradient(circle at center, rgba(57,255,20,0.05) 0%, rgba(5,5,5,1) 70%)'; return; }
      let W, H, particles = [], rafId, baseSpeed = 0.25, scrollBoost = 0, lastScroll = 0;
      function resize() { W = window.innerWidth; H = window.innerHeight; canvas.width = W; canvas.height = H; initParticles(); }
      function initParticles() { particles = []; for (let i = 0; i < 2000; i++) { particles.push({ x: Math.random() * W, y: Math.random() * H, size: Math.random() * 1.5 + 0.5, speed: (Math.random() * 0.5 + 0.5) * baseSpeed, opacity: Math.random() * 0.5 + 0.3, color: COLORS[Math.floor(Math.random() * COLORS.length)] }); } }
      function render() {
        ctx.clearRect(0, 0, W, H);
        ctx.save(); ctx.globalCompositeOperation = 'lighter';
        for (const p of particles) { const s = p.speed + scrollBoost; p.y -= s; if (p.y + p.size < 0) { p.y = H + p.size; p.x = Math.random() * W; } ctx.globalAlpha = p.opacity; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); }
        ctx.restore();
        const gx = W / 200, gy = H / 200;
        ctx.strokeStyle = 'rgba(57,255,20,0.08)'; ctx.lineWidth = 1; ctx.beginPath();
        for (let c = 0; c <= 200; c++) { ctx.moveTo(c * gx, 0); ctx.lineTo(c * gx, H); }
        for (let r = 0; r <= 200; r++) { ctx.moveTo(0, r * gy); ctx.lineTo(W, r * gy); }
        ctx.stroke();
        const cx = W / 2, cy = H / 2, grad = ctx.createRadialGradient(cx, cy, W * 0.2, cx, cy, W * 0.8);
        grad.addColorStop(0, 'rgba(5,5,5,0)'); grad.addColorStop(1, 'rgba(5,5,5,0.9)');
        ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
        scrollBoost *= 0.95; if (scrollBoost < 0.001) scrollBoost = 0;
        rafId = requestAnimationFrame(render);
      }
      window.addEventListener('scroll', () => { const d = Math.abs(window.scrollY - lastScroll); scrollBoost = Math.min(d * 0.01, 2); lastScroll = window.scrollY; }, { passive: true });
      let rt; window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(resize, 150); });
      document.fonts.ready.then(() => { requestAnimationFrame(() => { resize(); rafId = requestAnimationFrame(render); }); });
    })();

    // Nav scroll
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => { const s = window.scrollY > 100; navbar.style.background = s ? 'rgba(5,5,5,0.9)' : 'transparent'; navbar.style.backdropFilter = s ? 'blur(12px)' : 'none'; }, { passive: true });

    // Reveal observer
    const ro = new IntersectionObserver((entries) => { entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }); }, { threshold: 0.15 });
    document.querySelectorAll('.reveal').forEach(el => ro.observe(el));

    // Gallery data — all images including Instagram downloads
    const ALL_IMAGES = [
      { src: '/assets/images/gallery-opening.jpg', title: 'Opening Number', cat: 'PERFORMANCES' },
      { src: '/assets/images/gallery-neon-dreams.jpg', title: 'Neon Dreams', cat: 'EDITORIAL' },
      { src: '/assets/images/gallery-green-goddess.jpg', title: 'Green Goddess', cat: 'PERFORMANCES' },
      { src: '/assets/images/gallery-acid-elegance.jpg', title: 'Acid Elegance', cat: 'COLLABORATIONS' },
      { src: '/assets/images/gallery-trippy-couture.jpg', title: 'Trippy Couture', cat: 'EDITORIAL' },
      { src: '/assets/images/gallery-showstopper.jpg', title: 'Showstopper Finale', cat: 'PERFORMANCES' },
    ];

    // Instagram images from scraping
    const INSTA_IMAGES = [
      "DFBhpMRxoKE.jpg","DI2Ca62siKm.jpg","DIR5_hnyG2p_1.jpg","DIR5_hnyG2p_2.jpg","DIR5_hnyG2p_3.jpg","DIR5_hnyG2p_4.jpg","DIR5_hnyG2p_5.jpg","DIR5_hnyG2p_6.jpg","DIR5_hnyG2p_7.jpg","DIR5_hnyG2p_8.jpg","DLHelCEsqqR.jpg","DMDxvYiRrtb.jpg","DNEZ6VDRxEJ.jpg","DNotfHcxMD1_1.jpg","DNotfHcxMD1_2.jpg","DOcWhAbDJgF.jpg","DOtbzLGDoVN.jpg","DPHAr0hjb0r.jpg","DRI-ge4D1xR.jpg","DT1K_wzlpbE_1.jpg","DT1K_wzlpbE_2.jpg","DT1K_wzlpbE_3.jpg","DT1K_wzlpbE_4.jpg","DT1K_wzlpbE_5.jpg","DT1K_wzlpbE_6.jpg","DT1K_wzlpbE_7.jpg",
    ];

    const CATEGORIES = ['ALL', 'PERFORMANCES', 'EDITORIAL', 'COLLABORATIONS'];
    let currentCat = 'ALL';

    function renderGallery() {
      const grid = document.getElementById('galleryGrid');
      const items = currentCat === 'ALL' ? ALL_IMAGES : ALL_IMAGES.filter(i => i.cat === currentCat);
      grid.innerHTML = items.map((item, i) => `
        <div class="group relative overflow-hidden panel-surface cursor-pointer will-change-transform reveal reveal-delay-${(i % 3) + 1}" style="aspect-ratio: 3/4;">
          <img src="${item.src}" alt="${item.title}" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" loading="lazy" style="opacity: 0; transition: opacity 0.6s ease;" onload="this.style.opacity = '1'">
          <div class="absolute inset-0 bg-void/60 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-6">
            <span class="font-inter font-semibold text-xs tracking-[0.15em] text-acid uppercase">${item.cat}</span>
            <h3 class="font-inter font-medium text-text-primary text-lg mt-1">${item.title}</h3>
          </div>
        </div>
      `).join('');
      document.querySelectorAll('#galleryGrid .reveal').forEach(el => ro.observe(el));
    }

    function renderFilters() {
      const container = document.getElementById('filterContainer');
      container.innerHTML = CATEGORIES.map(c => `
        <button onclick="filterGallery('${c}')" class="font-inter font-semibold text-xs tracking-[0.15em] px-4 py-2 rounded-sm transition-all duration-200" style="background: ${currentCat === c ? '#39ff14' : 'transparent'}; color: ${currentCat === c ? '#050505' : '#666'}; border: ${currentCat === c ? '1px solid #39ff14' : '1px solid rgba(57,255,20,0.08)'};">${c}</button>
      `).join('');
    }

    window.filterGallery = function(cat) { currentCat = cat; renderFilters(); renderGallery(); };

    renderFilters();
    renderGallery();
  </script>
</body>
</html>
